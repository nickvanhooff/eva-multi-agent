services:
  ollama:
    image: ollama/ollama:latest
    container_name: eva-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  eva:
    build: .
    container_name: eva-multi-agent
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./campaigns:/app/campaigns
      - ./data:/app/data
      - sdxl_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Environment vars come from .env file (env_file above)
    # To override, uncomment and set here:
    # environment:
    #   - LLM_PROVIDER=ollama
    #   - LLM_BASE_URL=http://ollama:11434/v1
    #   - LLM_MODEL=qwen3.5:4b
    #   - LLM_API_KEY=ollama

volumes:
  ollama_data:
  sdxl_cache:
